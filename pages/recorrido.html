<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recorrido Virtual – CONRAD Centro de Diagnóstico</title>
  <link rel="stylesheet" href="../css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,800;1,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#f0f4ff;color:#1e293b;overflow-x:hidden}

/* NAV placeholder */
.nav-space{height:70px}

/* PAGE HERO */
.page-hero{
  background:linear-gradient(160deg,#060d1a,#071818,#061c2a);
  padding:calc(70px + 3rem) 0 3rem;
  text-align:center;position:relative;overflow:hidden;
}
.page-hero::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(0,196,180,.1) 1.5px,transparent 1.5px);background-size:32px 32px;pointer-events:none}
.page-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(0,196,180,.5),transparent)}
.ph-inner{position:relative;z-index:1}
.ph-crumb{display:flex;align-items:center;gap:.4rem;justify-content:center;font-size:.76rem;color:rgba(255,255,255,.3);margin-bottom:.75rem}
.ph-crumb a{color:#00c4b4;text-decoration:none}
.ph-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3rem);font-weight:800;color:#fff;letter-spacing:-.025em;margin-bottom:.5rem}
.ph-sub{color:rgba(255,255,255,.5);font-size:.95rem}

/* MAIN */
.wrap{max-width:1100px;margin:0 auto;padding:0 clamp(1.2rem,4vw,2.5rem)}
.main-sec{padding:clamp(3rem,6vw,5rem) 0}

/* VIDEO PLAYER LAYOUT */
.player-layout{
  display:grid;
  grid-template-columns:1fr 300px;
  gap:1.5rem;
  align-items:start;
}
@media(max-width:800px){.player-layout{grid-template-columns:1fr;}.playlist{margin-top:1rem}}

/* Main video */
.video-main-wrap{
  background:#000;
  border-radius:20px;
  overflow:hidden;
  position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
  width:100%;
  aspect-ratio:16/9;
  min-height:200px;
}
.video-main-wrap video{
  width:100%;height:100%;
  object-fit:contain;
  display:block;
  background:#000;
}

/* Video info below player */
.video-info{margin-top:1.2rem}
.video-title{
  font-family:'Playfair Display',serif;
  font-size:1.5rem;font-weight:700;color:#1e293b;
  margin-bottom:.35rem;
}
.video-desc{color:#64748b;font-size:.88rem;line-height:1.6}
.video-meta{
  display:flex;align-items:center;gap:.75rem;margin-top:.75rem;flex-wrap:wrap;
}
.video-badge{
  display:inline-flex;align-items:center;gap:.4rem;
  background:rgba(0,196,180,.1);border:1px solid rgba(0,196,180,.2);
  color:#00a89a;font-size:.75rem;font-weight:700;
  padding:4px 12px;border-radius:100px;
}

/* Playlist */
.playlist{
  background:#fff;
  border-radius:20px;
  border:1.5px solid #e8edf5;
  overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.06);
}
.playlist-header{
  padding:1rem 1.2rem;
  border-bottom:1px solid #f1f5f9;
  display:flex;align-items:center;justify-content:space-between;
}
.playlist-title{font-size:.78rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#94a3b8}
.playlist-count{font-size:.75rem;color:#00a89a;font-weight:700;background:rgba(0,196,180,.1);padding:2px 8px;border-radius:100px}
.playlist-list{max-height:520px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#e2e8f0 transparent}

.pitem{
  display:flex;align-items:center;gap:.85rem;
  padding:.85rem 1.1rem;cursor:pointer;
  border-bottom:1px solid #f8fafc;
  transition:all .2s;position:relative;
}
.pitem:last-child{border-bottom:none}
.pitem:hover{background:#f8fafc}
.pitem.active{
  background:linear-gradient(135deg,rgba(0,196,180,.08),rgba(0,196,180,.03));
  border-left:3px solid #00c4b4;
}
.pitem.active .pitem-num{color:#00c4b4}

/* Thumbnail */
.pthumbnail{
  width:72px;height:48px;border-radius:8px;
  overflow:hidden;flex-shrink:0;
  background:linear-gradient(135deg,#060d1a,#071818);
  position:relative;
}
.pthumbnail video{
  width:100%;height:100%;object-fit:cover;
  pointer-events:none;
}
.pthumbnail-overlay{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.25);transition:background .2s;
}
.pitem:hover .pthumbnail-overlay{background:rgba(0,0,0,.1)}
.pitem.active .pthumbnail-overlay{background:rgba(0,196,180,.2)}
.play-icon{
  width:22px;height:22px;
  background:rgba(255,255,255,.9);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.play-icon svg{fill:#1e293b;width:9px;height:9px;margin-left:1px}

.pitem-info{flex:1;min-width:0}
.pitem-title{font-size:.83rem;font-weight:700;color:#1e293b;line-height:1.3;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pitem-sub{font-size:.72rem;color:#94a3b8}
.pitem-num{font-size:.7rem;font-weight:800;color:#cbd5e1;margin-left:auto;flex-shrink:0}
.pitem.active .pitem-title{color:#00a89a}

/* Now playing indicator */
.now-playing{
  display:none;align-items:center;gap:3px;margin-left:auto;
}
.pitem.active .now-playing{display:flex}
.pitem.active .pitem-num{display:none}
.np-bar{
  width:3px;border-radius:100px;
  background:#00c4b4;
  animation:npBar 1s ease-in-out infinite alternate;
}
.np-bar:nth-child(1){height:8px;animation-delay:0s}
.np-bar:nth-child(2){height:14px;animation-delay:.2s}
.np-bar:nth-child(3){height:6px;animation-delay:.4s}
@keyframes npBar{from{opacity:.4;transform:scaleY(.6)}to{opacity:1;transform:scaleY(1)}}

/* Progress */
.video-progress{
  display:flex;align-items:center;gap:.75rem;
  margin-top:1rem;
  padding:.85rem 1.2rem;
  background:#fff;border-radius:12px;
  border:1.5px solid #e8edf5;
}
.vp-time{font-size:.78rem;font-weight:700;color:#64748b;white-space:nowrap;min-width:40px}
.vp-bar-wrap{flex:1;height:6px;background:#e2e8f0;border-radius:100px;cursor:pointer;position:relative}
.vp-bar-fill{height:100%;background:linear-gradient(to right,#00c4b4,#10b981);border-radius:100px;transition:width .1s;position:relative}
.vp-bar-fill::after{content:'';position:absolute;right:-6px;top:50%;transform:translateY(-50%);width:14px;height:14px;background:#00c4b4;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,196,180,.4)}
.vp-controls{display:flex;align-items:center;gap:.6rem}
.vp-btn{
  width:36px;height:36px;
  background:rgba(0,196,180,.1);border:none;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;color:#00a89a;font-size:.9rem;
}
.vp-btn:hover{background:rgba(0,196,180,.2);transform:scale(1.05)}
.vp-vol{width:70px;height:4px;background:#e2e8f0;border-radius:100px;cursor:pointer;appearance:none}
.vp-vol::-webkit-slider-thumb{appearance:none;width:14px;height:14px;background:#00c4b4;border-radius:50%;cursor:pointer}

/* FADE IN */
.fi{opacity:0;transform:translateY(18px);transition:opacity .55s ease,transform .55s ease}
.fi.visible{opacity:1;transform:none}
.d1{transition-delay:.1s}.d2{transition-delay:.2s}
/* Ensure player is always visible */
.player-layout{opacity:1!important;transform:none!important}
</style>
</head>
<body>
<div id="header-root"></div>

<div class="page-hero">
  <div class="ph-inner">
    <div class="ph-crumb"><a href="/">Inicio</a><span>›</span><span>Recorrido Virtual</span></div>
    <h1 class="ph-title">Recorrido Virtual</h1>
    <p class="ph-sub">Conoce nuestros equipos e instalaciones antes de tu visita</p>
  </div>
</div>

<section class="main-sec" style="background:#f8fafc">
  <div class="wrap">
    <div class="player-layout">

      <!-- MAIN PLAYER -->
      <div>
        <div class="video-main-wrap">
          <video id="mainVideo" controls playsinline preload="metadata"
                 style="width:100%;height:100%;display:block;background:#000">
            <source id="mainSource" src="" type="video/mp4">
            Tu navegador no soporta video HTML5.
          </video>
        </div>

        <!-- Custom progress bar -->
        <div class="video-progress">
          <div class="vp-controls">
            <button class="vp-btn" id="btnPlay" onclick="togglePlay()" title="Play/Pause">▶</button>
          </div>
          <span class="vp-time" id="currentTime">0:00</span>
          <div class="vp-bar-wrap" id="progressBar" onclick="seekVideo(event)">
            <div class="vp-bar-fill" id="progressFill" style="width:0%"></div>
          </div>
          <span class="vp-time" id="duration">0:00</span>
          <div class="vp-controls">
            <button class="vp-btn" id="btnMute" onclick="toggleMute()" title="Silenciar">🔊</button>
          </div>
          <input type="range" class="vp-vol" id="volSlider" min="0" max="1" step="0.1" value="1" oninput="setVolume(this.value)">
        </div>

        <div class="video-info">
          <h2 class="video-title" id="mainTitle">—</h2>
          <p class="video-desc" id="mainDesc">—</p>
          <div class="video-meta">
            <span class="video-badge">🎬 CONRAD</span>
            <span class="video-badge" id="mainDurBadge">⏱ —</span>
          </div>
        </div>
      </div>

      <!-- PLAYLIST -->
      <div>
        <div class="playlist">
          <div class="playlist-header">
            <span class="playlist-title">Playlist</span>
            <span class="playlist-count" id="plCount">6 videos</span>
          </div>
          <div class="playlist-list" id="playlistEl"></div>
        </div>
      </div>

    </div>
  </div>
</section>

<div id="footer-root"></div>
<div id="chatbot-root"></div>
<script src="../js/components.js"></script>
<script>
document.getElementById('header-root').innerHTML = renderNavbar('recorrido', false);
document.getElementById('footer-root').innerHTML = renderFooter(false);
document.getElementById('chatbot-root').innerHTML = renderChatbot();

// ── VIDEO DATA ──
// Rutas relativas desde /pages/ → ../assets/videos/
const VIDEOS = [
  { src: '../assets/videos/entrada.mp4',              title: 'Entrada y Recepción',      desc: 'Área de ingreso y recepción de CONRAD Centro de Diagnóstico' },
  { src: '../assets/videos/servicios%20en%20general.mp4', title: 'Servicios en General',      desc: 'Conoce todos los servicios que ofrecemos en CONRAD' },
  { src: '../assets/videos/ultrasonido.mp4',          title: 'Sala de Ultrasonido',       desc: 'Equipo de ultrasonido de última generación, incluyendo 5D obstétrico y Doppler' },
  { src: '../assets/videos/tomografias.mp4',          title: 'Equipo de Tomografía',      desc: 'Tomógrafo CT de alta definición para estudios complejos' },
  { src: '../assets/videos/rayos-x.mp4',              title: 'Sala de Rayos X',           desc: 'Radiología digital de alta resolución para diagnóstico preciso' },
  { src: '../assets/videos/mamografia.mp4',           title: 'Mamografía Digital',        desc: 'Equipo de mamografía digital para detección temprana' },
];

const mainVideo  = document.getElementById('mainVideo');
const mainSource = document.getElementById('mainSource');
let currentIdx   = 0;

// ── BUILD PLAYLIST ──
const plEl = document.getElementById('playlistEl');
plEl.innerHTML = VIDEOS.map((v, i) => `
  <div class="pitem ${i===0?'active':''}" id="pitem-${i}" onclick="selectVideo(${i})">
    <div class="pthumbnail">
      <video src="${v.src}" muted preload="metadata" style="pointer-events:none"
             onloadeddata="captureThumb(this,${i})"></video>
      <div class="pthumbnail-overlay">
        <div class="play-icon"><svg viewBox="0 0 10 12"><path d="M0 0l10 6-10 6z"/></svg></div>
      </div>
    </div>
    <div class="pitem-info">
      <div class="pitem-title">${v.title}</div>
      <div class="pitem-sub">${v.desc.split(' ').slice(0,5).join(' ')}…</div>
    </div>
    <div class="pitem-num">${String(i+1).padStart(2,'0')}</div>
    <div class="now-playing">
      <div class="np-bar"></div><div class="np-bar"></div><div class="np-bar"></div>
    </div>
  </div>`).join('');

// ── SELECT VIDEO ──
function selectVideo(idx) {
  currentIdx = idx;
  const v = VIDEOS[idx];
  // Update source
  mainSource.src = v.src;
  mainVideo.load();
  mainVideo.play().catch(()=>{
    // Video not found yet - show placeholder
    document.getElementById('btnPlay').textContent = '▶';
  });
  // Update info
  document.getElementById('mainTitle').textContent = v.title;
  document.getElementById('mainDesc').textContent  = v.desc;
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('currentTime').textContent = '0:00';
  // Update playlist active
  document.querySelectorAll('.pitem').forEach((el,i) => el.classList.toggle('active', i===idx));
  document.getElementById('btnPlay').textContent = '⏸';
}

// Init first video
selectVideo(0);

// ── PLAYER CONTROLS ──
function togglePlay() {
  if (mainVideo.paused) { mainVideo.play(); document.getElementById('btnPlay').textContent = '⏸'; }
  else { mainVideo.pause(); document.getElementById('btnPlay').textContent = '▶'; }
}
function toggleMute() {
  mainVideo.muted = !mainVideo.muted;
  document.getElementById('btnMute').textContent = mainVideo.muted ? '🔇' : '🔊';
}
function setVolume(v) { mainVideo.volume = v; }
function seekVideo(e) {
  const bar = document.getElementById('progressBar');
  const pct = e.offsetX / bar.offsetWidth;
  mainVideo.currentTime = pct * mainVideo.duration;
}
function fmtTime(s) {
  if (isNaN(s)) return '0:00';
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return m + ':' + String(sec).padStart(2,'0');
}
mainVideo.addEventListener('timeupdate', () => {
  const pct = mainVideo.duration ? (mainVideo.currentTime / mainVideo.duration)*100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('currentTime').textContent = fmtTime(mainVideo.currentTime);
});
mainVideo.addEventListener('loadedmetadata', () => {
  document.getElementById('duration').textContent = fmtTime(mainVideo.duration);
  document.getElementById('mainDurBadge').textContent = '⏱ ' + fmtTime(mainVideo.duration);
});
mainVideo.addEventListener('ended', () => {
  // Auto-play next
  if (currentIdx < VIDEOS.length - 1) selectVideo(currentIdx + 1);
  else document.getElementById('btnPlay').textContent = '▶';
});
mainVideo.addEventListener('play',  () => document.getElementById('btnPlay').textContent = '⏸');
mainVideo.addEventListener('pause', () => document.getElementById('btnPlay').textContent = '▶');
mainVideo.addEventListener('error', () => {
  document.getElementById('btnPlay').textContent = '▶';
  document.getElementById('mainDurBadge').textContent = '⚠ Video no disponible aún';
});

// Capture thumbnail from video element
function captureThumb(videoEl, idx) {
  // Seek to 1s to get a good frame
  videoEl.currentTime = 1;
}
</script>
</body>
</html>
